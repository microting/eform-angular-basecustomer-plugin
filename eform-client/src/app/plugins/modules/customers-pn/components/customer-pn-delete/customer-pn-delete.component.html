<h3 mat-dialog-title>{{ 'Delete Customer' | translate }}</h3>
<div mat-dialog-content>
  <p>{{ 'Are you sure you want to delete' | translate }} <strong>{{ selectedCustomer.companyName }}</strong>?</p>
</div>
<div mat-dialog-actions class="d-flex flex-row justify-content-end">
  <button
    class="btn-cancel"
    (click)="hide()"
    id="cancelDeleteBtn">
    {{ 'Cancel' | translate }}
  </button>
  <button
    class="btn-primary btn-danger"
    (click)="deleteCustomer()"
    id="confirmDeleteBtn">
    {{ 'Delete' | translate }}
  </button>
</div>
