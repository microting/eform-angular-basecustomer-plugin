<eform-new-subheader>
  <div class="d-flex flex-row align-items-center gap-12">
    <span>{{ 'Customers plugin settings' | translate }}</span>
  </div>
</eform-new-subheader>

<div class="container-fluid p-3">
  <h4>{{ 'Fields' | translate }}</h4>
  <div class="d-flex flex-column gap-12 mb-3">
    <mat-slide-toggle
      *ngFor="let field of fieldsUpdateModel.fields"
      [id]="'fieldToggle-' + field.id"
      color="primary"
      [checked]="field.fieldStatus === fieldStatusEnum.Enabled"
      (change)="onFieldToggle($event, field)">
      {{ field.name | translate }}
    </mat-slide-toggle>
  </div>

  <div class="d-flex flex-row justify-content-end mt-3">
    <button
      class="btn-cancel"
      routerLink="/plugins-settings"
      id="cancelSettingsBtn">
      {{ 'Cancel' | translate }}
    </button>
    <button
      class="btn-primary btn-primary--icon-left"
      (click)="updateSettings()"
      id="saveSettingsBtn">
      {{ 'Save' | translate }}
    </button>
  </div>
</div>
